<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Reserva de Salas - WorldSkills</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 1000px; margin: 20px auto; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 15px; background-color: #007bff; color: white; border: none; cursor: pointer; margin-right: 5px; }
        button:hover { background-color: #0056b3; }
        button.delete { background-color: #dc3545; }
        button.delete:hover { background-color: #a71d2a; }
        .error { color: red; font-weight: bold; }
        .success { color: green; font-weight: bold; }
        h2 { margin-top: 30px; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
    </style>
</head>
<body>
    <h1>🏢 Sistema de Reserva de Salas</h1>

    <h2>📋 Salas Cadastradas</h2>
    <table id="tabelaSalas">
        <thead><tr><th>ID</th><th>Nome</th><th>Capacidade</th></tr></thead>
        <tbody></tbody>
    </table>

    <h2>📅 Reservas Agendadas</h2>
    <table id="tabelaReservas">
        <thead>
            <tr>
                <th>ID</th>
                <th>Sala</th>
                <th>Responsável</th>
                <th>Início</th>
                <th>Fim</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <h2>➕ Nova Reserva</h2>
    <form id="formReserva">
        <div class="form-group">
            <label>Sala:</label>
            <select id="salaId" required></select>
        </div>
        <div class="form-group">
            <label>Responsável:</label>
            <input type="text" id="responsavel" required>
        </div>
        <div class="form-group">
            <label>Início:</label>
            <input type="datetime-local" id="dataInicio" required>
        </div>
        <div class="form-group">
            <label>Fim:</label>
            <input type="datetime-local" id="dataFim" required>
        </div>
        <button type="submit">Reservar</button>
        <p id="mensagem"></p>
    </form>

    <script>
        const apiUrl = '/api';

        // Carregar Salas
        async function carregarSalas() {
            const response = await fetch(`${apiUrl}/salas`);
            const salas = await response.json();
            
            const tbody = document.querySelector('#tabelaSalas tbody');
            const select = document.getElementById('salaId');
            
            tbody.innerHTML = '';
            select.innerHTML = '<option value="">Selecione...</option>';

            salas.forEach(sala => {
                tbody.innerHTML += `<tr><td>${sala.id}</td><td>${sala.nome}</td><td>${sala.capacidade}</td></tr>`;
                select.innerHTML += `<option value="${sala.id}">${sala.nome}</option>`;
            });
        }

        // Carregar Reservas
        async function carregarReservas() {
            const response = await fetch(`${apiUrl}/reservas`);
            const reservas = await response.json();
            
            const tbody = document.querySelector('#tabelaReservas tbody');
            tbody.innerHTML = '';

            if (reservas.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">Nenhuma reserva agendada</td></tr>';
                return;
            }

            reservas.forEach(reserva => {
                const dataInicio = new Date(reserva.dataInicio).toLocaleString('pt-BR');
                const dataFim = new Date(reserva.dataFim).toLocaleString('pt-BR');
                const nomeSala = reserva.sala ? reserva.sala.nome : `Sala ${reserva.salaId}`;
                
                tbody.innerHTML += `
                    <tr>
                        <td>${reserva.id}</td>
                        <td>${nomeSala}</td>
                        <td>${reserva.responsavel}</td>
                        <td>${dataInicio}</td>
                        <td>${dataFim}</td>
                        <td>
                            <button class="delete" onclick="deletarReserva(${reserva.id})">Excluir</button>
                        </td>
                    </tr>
                `;
            });
        }

        // Deletar Reserva
        async function deletarReserva(id) {
            if (!confirm('Deseja realmente excluir esta reserva?')) return;

            const response = await fetch(`${apiUrl}/reservas/${id}`, {
                method: 'DELETE'
            });

            if (response.ok || response.status === 204) {
                carregarReservas(); // Recarrega a lista
            } else {
                alert('Erro ao excluir reserva');
            }
        }

        // Criar Reserva
        document.getElementById('formReserva').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = document.getElementById('mensagem');
            msg.className = '';
            msg.innerText = '';

            const dados = {
                salaId: parseInt(document.getElementById('salaId').value),
                responsavel: document.getElementById('responsavel').value,
                dataInicio: document.getElementById('dataInicio').value,
                dataFim: document.getElementById('dataFim').value
            };

            const response = await fetch(`${apiUrl}/reservas`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            });

            if (response.ok) {
                msg.className = 'success';
                msg.innerText = 'Reserva criada com sucesso!';
                e.target.reset();
                carregarReservas(); // Recarrega a lista de reservas
            } else {
                const erro = await response.json();
                msg.className = 'error';
                msg.innerText = `Erro: ${erro.mensagem || 'Verifique os dados.'}`;
            }
        });

        // Iniciar
        carregarSalas();
        carregarReservas(); // Carrega as reservas ao iniciar
    </script>
</body>
</html>
